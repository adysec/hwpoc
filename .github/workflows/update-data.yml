name: 更新漏洞数据

on:
  issues:
    types: [labeled]
  push:
    paths:
      - 'docs/_data/**/*.toml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: |
      github.event.label.name == '审核通过' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 处理 Issue → TOML
        if: github.event_name == 'issues'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/process-issue.py

      - name: 重建站点
        run: python scripts/build-static.py

      - name: 提交变更
        run: |
          git config user.name "AdySec Bot"
          git config user.email "bot@adysec.com"
          git add docs/_data/ docs/*.html docs/assets/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore(data): 更新漏洞数据"
          git push
