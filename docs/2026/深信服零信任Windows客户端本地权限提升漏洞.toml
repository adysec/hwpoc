detail = """深信服零信任Windows客户端存在本地权限提升漏洞。在受控测试中，以普通用户权限运行验证程序，通过逆向目标终端组件，成功触发高权限进程调用并绕过安全助手。普通权限上下文可借助目标组件的高权限能力启动任意程序，表明相关组件在调用者身份校验、进程创建控制、参数约束或权限继承方面存在安全缺陷。
目前猜测为命令注入或代码注入，通过代码审计或逆向dll或程序本体实现
来源: https://mp.weixin.qq.com/s/Pxkxbsq2JttOhW2mgqx1RA"""
fix = """1. 在零信任Windows客户端的高权限组件中增加调用者身份强校验，拒绝非授权进程的调用请求
2. 对进程创建参数实施白名单机制，禁止参数注入
3. 降低高权限组件的运行权限，遵循最小权限原则
4. 审查安全助手交互弹窗逻辑，默认拒绝高风险操作"""
