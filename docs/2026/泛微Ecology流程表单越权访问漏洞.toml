name = "泛微Ecology流程表单越权访问漏洞"
type = "未授权访问"
detail = """泛微Ecology企业流程管理平台存在业务接口访问控制不充分漏洞。服务端未充分校验调用者身份、调用者与目标流程之间的权限关系、调用者是否属于流程参与人员以及是否具备查看对应字段的权限。通过修改请求中的业务对象标识，可越权读取其他流程的完整表单数据，包括流程名称、状态、表单结构、字段值、部门及组织信息等。业务对象标识可预测时，可批量遍历大量业务流程数据。

来源: https://mp.weixin.qq.com/s/Pxkxbsq2JttOhW2mgqx1RA"""
fix = """1. 每次读取流程/表单/附件/业务对象时，服务端必须验证当前调用者是否具备访问该对象的权限，不能仅依赖前端页面隐藏或菜单权限
2. 采用"默认拒绝"原则，只有明确满足流程参与人、部门权限、角色权限或数据授权规则时才允许返回数据
3. 对涉及个人信息、财务信息和商业秘密的字段实施独立权限控制和必要脱敏
4. 实施接口频率限制、连续对象编号访问检测、异常响应大小检测等反自动化遍历措施"""
