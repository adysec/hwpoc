vendor = "Microsoft"
name = "Windows 用户配置文件服务任意加载注册表单元权限提升漏洞 LegacyHive"
type = "本地提权"
version = "Windows 10/11 所有版本, Windows Server 所有版本（含 2026 年 7 月补丁后）"
detail = """Windows 用户配置文件服务（User Profile Service, ProfSvc）存在任意加载注册表单元（hive）的权限提升漏洞（LegacyHive，又名 MSNightmare）。低权限用户可将另一个用户的 UsrClass.dat 注册表配置单元挂载到自己的 HKEY_CLASSES_ROOT 下，从而暴露该用户的应用程序数据和配置。非管理员用户可修改管理员用户的 Classes 注册表配置单元，劫持该账户启动应用程序或 COM 对象的方式（如修改 .txt 文件关联启动 calc.exe）。攻击者还可覆盖管理员登录时自动加载的 COM 对象或 shell 扩展，实现持久化与代码执行。NightmareEclipse 公开的 PoC 被故意精简（需额外标准用户凭据，仅限 UsrClass.dat），原始漏洞据称无需额外凭据，可强制 ProfSvc 以 SYSTEM 权限加载任意配置单元。微软 2026 年 7 月安全更新未能修复该漏洞。
GitHub PoC: https://github.com/MSNightmare/LegacyHive
最早披露: 2026-07-14"""
fix = "微软尚未发布完整修复补丁；临时措施：限制特权账户的本地登录；隔离管理员工作站；加强对注册表配置单元修改的监控；监控管理员配置文件中的 COM/对象注册变更；发现存在 LegacyHive 工具的系统视为已受损。"
date = 20260715
label = "0day"
verifier = "AdySec"
