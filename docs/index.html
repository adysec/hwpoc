<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>首页 — 护网漏洞库</title>
<style>:root {
  --bg: #fff;
  --surface: #f8f9fa;
  --surface-hover: #f1f3f4;
  --border: #e0e0e0;
  --border-subtle: #f0f0f0;
  --text: #333;
  --text-muted: #888;
  --text-strong: #1a1a1a;
  --primary: #1a73e8;
  --primary-hover: #1557b0;
  --primary-bg: #e8f0fe;
  --table-even: #fafafa;
  --table-hover: #f1f3f4;
  --tag-bg: #f1f3f4;
  --tag-text: #555;
  --label-0day-bg: #fce8e6;
  --label-0day-text: #d93025;
  --label-1day-bg: #fef7e0;
  --label-1day-text: #e37400;
  --label-nday-bg: #e6f4ea;
  --label-nday-text: #188038;
  --card-bg: #f8f9fa;
  --card-border: #e0e0e0;
  --btn-outline-text: #555;
  --btn-outline-border: #dadce0;
  --btn-outline-hover: #f1f3f4;
  --scroll-thumb: #ccc;
  --scroll-track: #f1f1f1;
  --shadow: rgba(0,0,0,0.12);
}
[data-theme="dark"] {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-hover: #1c2128;
  --border: #30363d;
  --border-subtle: #21262d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --text-strong: #e6edf3;
  --primary: #58a6ff;
  --primary-hover: #79c0ff;
  --primary-bg: #0d4196;
  --table-even: #0d1117;
  --table-hover: #1c2128;
  --tag-bg: #21262d;
  --tag-text: #8b949e;
  --label-0day-bg: #490202;
  --label-0day-text: #f85149;
  --label-1day-bg: #3d2e00;
  --label-1day-text: #d29922;
  --label-nday-bg: #002d13;
  --label-nday-text: #3fb950;
  --card-bg: #161b22;
  --card-border: #30363d;
  --btn-outline-text: #8b949e;
  --btn-outline-border: #30363d;
  --btn-outline-hover: #1c2128;
  --scroll-thumb: #30363d;
  --scroll-track: #161b22;
  --shadow: rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 13px; line-height: 1.5;
}

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Top Bar ── */
.doc-topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 20px; display: flex; align-items: center; gap: 16px;
}
.doc-title { font-size: 16px; font-weight: 600; color: var(--text-strong); }
.doc-title a { color: inherit; }
.doc-title a:hover { text-decoration: none; }
.doc-title small { font-weight: 400; font-size: 12px; color: var(--text-muted); margin-left: 6px; }

.doc-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 500;
  background: var(--primary); color: #fff; border: none; cursor: pointer;
  text-decoration: none;
}
.btn:hover { background: var(--primary-hover); text-decoration: none; }
.btn-outline { background: transparent; color: var(--btn-outline-text); border: 1px solid var(--btn-outline-border); }
.btn-outline:hover { background: var(--btn-outline-hover); }

.theme-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 4px; cursor: pointer;
  color: var(--text-muted); border: 1px solid var(--btn-outline-border);
  background: transparent; font-size: 16px; line-height: 1; padding: 0;
}
.theme-btn:hover { background: var(--btn-outline-hover); color: var(--text); }

/* ── Sheet Tabs ── */
.sheet-bar {
  display: flex; align-items: center;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; overflow-x: auto;
}
.sheet-tab {
  padding: 8px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; user-select: none; text-decoration: none;
}
.sheet-tab:hover { color: var(--primary); background: var(--primary-bg); text-decoration: none; }
.sheet-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.sheet-add {
  padding: 8px 12px; color: var(--text-muted); font-size: 18px; line-height: 1;
  cursor: pointer; display: inline-flex; align-items: center;
  text-decoration: none;
}
.sheet-add:hover { color: var(--primary); text-decoration: none; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-wrap: wrap;
}
.toolbar .search-wrap {
  position: relative; flex: 1; min-width: 200px; max-width: 400px;
}
.toolbar .search-wrap input {
  width: 100%; padding: 6px 12px 6px 32px;
  border: 1px solid var(--btn-outline-border); border-radius: 4px;
  font-size: 13px; outline: none; background: var(--surface); color: var(--text);
}
.toolbar .search-wrap input:focus { border-color: var(--primary); }
.toolbar .search-wrap .icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px;
}
.toolbar .stat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
}
.toolbar .stat-badge.total { background: var(--primary-bg); color: var(--primary); }
.toolbar .stat-badge.zday { background: var(--label-0day-bg); color: var(--label-0day-text); }
.toolbar .stat-badge.oney { background: var(--label-1day-bg); color: var(--label-1day-text); }
.toolbar .stat-badge.nday { background: var(--label-nday-bg); color: var(--label-nday-text); }

/* ── Table (spreadsheet style) ── */
.table-wrap { overflow: auto; max-height: calc(100vh - 180px); }
.table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
.table-wrap::-webkit-scrollbar-track { background: var(--scroll-track); }
.table-wrap::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }
.table-wrap table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  table-layout: auto;
}
.table-wrap thead { position: sticky; top: 0; z-index: 20; }
.table-wrap thead th {
  background: var(--surface); color: var(--text-muted); font-weight: 600; font-size: 12px;
  padding: 8px 10px; text-align: left; white-space: nowrap;
  border-bottom: 2px solid var(--border); border-right: 1px solid var(--border-subtle);
  cursor: pointer; user-select: none; position: relative;
}
.table-wrap thead th:last-child { border-right: none; }
.table-wrap thead th:hover { background: var(--surface-hover); }
.table-wrap thead th.sort-asc { color: var(--primary); }
.table-wrap thead th.sort-desc { color: var(--primary); }
.table-wrap thead th .sort-icon { display: inline-block; width: 14px; text-align: center; font-size: 10px; color: var(--text-muted); }
.table-wrap thead th.sort-asc .sort-icon { color: var(--primary); }
.table-wrap thead th.sort-desc .sort-icon { color: var(--primary); }

.table-wrap tbody td {
  padding: 6px 10px; border-bottom: 1px solid var(--border-subtle);
  border-right: 1px solid var(--border-subtle); vertical-align: middle;
  max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.table-wrap tbody td:last-child { border-right: none; }
.table-wrap tbody tr:hover td { background: var(--table-hover); }
.table-wrap tbody tr:nth-child(even) td { background: var(--table-even); }
.table-wrap tbody tr:nth-child(even):hover td { background: var(--table-hover); }

/* ── Cell expand on click ── */
.table-wrap tbody td.expand {
  white-space: normal; word-break: break-all;
  max-width: 500px; position: relative; z-index: 10;
  background: var(--bg); box-shadow: 0 1px 6px var(--shadow);
  border-radius: 2px;
}

/* ── Labels ── */
td .label {
  display: inline-block; padding: 1px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
}
.label-0day { background: var(--label-0day-bg); color: var(--label-0day-text); }
.label-1day { background: var(--label-1day-bg); color: var(--label-1day-text); }
.label-nday { background: var(--label-nday-bg); color: var(--label-nday-text); }

td .tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 11px; background: var(--tag-bg); color: var(--tag-text); font-weight: 500;
}

/* ── Home ── */
.home-page { padding: 60px 20px; text-align: center; }
.home-page h2 { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: var(--text-strong); }
.home-page p { color: var(--text-muted); max-width: 500px; margin: 0 auto 32px; font-size: 14px; }
.home-cards { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.home-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 160px; height: 100px; background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 4px; cursor: pointer; text-decoration: none; color: var(--text);
  transition: all .15s;
}
.home-card:hover { border-color: var(--primary); box-shadow: 0 1px 4px rgba(88,166,255,0.15); text-decoration: none; }
.home-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
.home-card .lbl { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.home-links { margin-top: 32px; display: flex; gap: 12px; justify-content: center; }

/* ── Footer ── */
.doc-footer {
  text-align: center; padding: 16px; font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--border-subtle);
}

/* ── Submit Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.45); align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  width: 100%; max-width: 640px; box-shadow: 0 4px 24px var(--shadow);
  margin-top: 20px;
}
.modal-header {
  display: flex; align-items: center; padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 15px; font-weight: 600; color: var(--text-strong); flex: 1; }
.modal-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px; cursor: pointer; border: none; background: transparent;
  font-size: 18px; color: var(--text-muted);
}
.modal-close:hover { background: var(--surface-hover); color: var(--text); }
.modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
.modal-body::-webkit-scrollbar { width: 6px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 20px; border-top: 1px solid var(--border);
}

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
  margin-bottom: 4px;
}
.form-group label .req { color: var(--label-0day-text); margin-left: 2px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 7px 10px; font-size: 13px;
  border: 1px solid var(--btn-outline-border); border-radius: 4px;
  background: var(--surface); color: var(--text); outline: none;
  font-family: inherit;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--primary);
}
.form-group textarea { resize: vertical; min-height: 48px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-group .radio-group { display: flex; gap: 10px; }
.form-group .radio-group label {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 400; cursor: pointer; color: var(--text);
}
.form-group .radio-group input { width: auto; }

@media (max-width: 768px) {
  .table-wrap { max-height: none; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar .search-wrap { max-width: none; }
  .sheet-tab { padding: 8px 12px; font-size: 12px; }
}
</style>
<script>(function(){var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}if(t==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();</script>
</head>
<body>
<div class="doc-topbar">
  <div class="doc-title"><a href="index.html">护网漏洞库</a> <small>护网漏洞情报</small></div>
  <div class="doc-actions">
    <button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
    <a class="btn" href="#" onclick="openModal();return false">＋ 提交漏洞</a>
    <a class="btn btn-outline" href="https://github.com/adysec/hwpoc" target="_blank">GitHub</a>
  </div>
</div>
<div class="sheet-bar"><a class="sheet-tab" href="2026.html">2026</a><a class="sheet-tab" href="2025.html">2025</a><a class="sheet-tab" href="2024.html">2024</a><a class="sheet-tab" href="2023.html">2023</a><a class="sheet-add" href="#" onclick="openModal();return false" title="提交漏洞">＋</a></div>
<div class="home-page">
<h2>护网漏洞库</h2>
<p>护网（HW）期间漏洞情报汇总 · 0day / 1day / nday</p>
<div class="home-cards"><a class="home-card" href="2026.html"><span class="num">0</span><span class="lbl">2026 年</span></a><a class="home-card" href="2025.html"><span class="num">333</span><span class="lbl">2025 年</span></a><a class="home-card" href="2024.html"><span class="num">455</span><span class="lbl">2024 年</span></a><a class="home-card" href="2023.html"><span class="num">325</span><span class="lbl">2023 年</span></a></div>
<div class="home-links">
<a class="btn" href="#" onclick="openModal();return false">＋ 提交漏洞</a>
<a class="btn btn-outline" href="https://github.com/adysec/hwpoc">GitHub 仓库</a>
</div>
</div>
<div class="modal-overlay" id="submitModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>提交漏洞</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>厂商 <span class="req">*</span></label><input id="f_vendor" placeholder="如 深信服、奇安信、用友"></div>
        <div class="form-group"><label>漏洞名称 <span class="req">*</span></label><input id="f_name" placeholder="如 CVE-2025-XXXX 或 产品名+类型"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>漏洞类型 <span class="req">*</span></label><input id="f_type" placeholder="如 RCE、SQL注入、未授权访问"></div>
        <div class="form-group"><label>涉及版本</label><input id="f_version" placeholder="受影响版本号或范围"></div>
      </div>
      <div class="form-group"><label>利用路径 / URL</label><input id="f_path" placeholder="漏洞触发路径或接口"></div>
      <div class="form-group"><label>漏洞详情 / POC</label><textarea id="f_detail" rows="3" placeholder="请在此粘贴 POC 或漏洞详情"></textarea></div>
      <div class="form-group"><label>处置建议 / 修复方案</label><textarea id="f_fix" rows="2" placeholder="升级版本、补丁链接、临时缓解措施"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>情报获取时间</label><input id="f_date" placeholder="如 0630、0701"></div>
        <div class="form-group"><label>来源 / 验证人</label><input id="f_source" placeholder="提交者昵称或来源"></div>
      </div>
      <div class="form-group">
        <label>标签 <span class="req">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="label" value="0day"> 0day</label>
          <label><input type="radio" name="label" value="1day"> 1day</label>
          <label><input type="radio" name="label" value="nday"> nday</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn" onclick="submitVuln('')">提交 Issue</button>
    </div>
  </div>
</div>
<div class="doc-footer">护网漏洞库 · 原数据维护于腾讯文档，因人数限制迁移至此；社区通过 Issue 提交，AdySec 审核维护</div>
<script>function toggleTheme(){var h=document.documentElement;var d=h.getAttribute('data-theme')==='dark';if(d){h.removeAttribute('data-theme');localStorage.setItem('theme','light')}else{h.setAttribute('data-theme','dark');localStorage.setItem('theme','dark')}}</script>
<script>
function openModal(){document.getElementById('submitModal').classList.add('active')}
function closeModal(){document.getElementById('submitModal').classList.remove('active')}
document.getElementById('submitModal').addEventListener('click',function(e){if(e.target===this)closeModal()});
window.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
function submitVuln(year){
var v=document.getElementById('f_vendor').value.trim(),n=document.getElementById('f_name').value.trim(),
t=document.getElementById('f_type').value.trim(),ver=document.getElementById('f_version').value.trim(),
p=document.getElementById('f_path').value.trim(),d=document.getElementById('f_detail').value.trim(),
f=document.getElementById('f_fix').value.trim(),dt=document.getElementById('f_date').value.trim(),
s=document.getElementById('f_source').value.trim(),l=(document.querySelector('input[name="label"]:checked')||{}).value||'';
if(!v||!n||!t||!l){alert('请填写厂商、漏洞名称、漏洞类型和标签（必填项）');return}
var b='### 厂商 *\n'+v+'\n\n### 漏洞名称 *\n'+n+'\n\n### 漏洞类型 *\n'+t;
if(ver)b+='\n\n### 涉及版本\n'+ver;if(p)b+='\n\n### 利用路径 / URL\n'+p;
if(d)b+='\n\n### 漏洞详情 / POC\n```\n'+d+'\n```';if(f)b+='\n\n### 处置建议 / 修复方案\n'+f;
if(dt)b+='\n\n### 情报获取时间\n'+dt;b+='\n\n### 标签 *\n- [x] '+l;
if(s)b+='\n\n### 来源 / 验证人\n'+s;
b+='\n\n---\n\n**提交前请确认：**\n- [ ] 该漏洞尚未存在于当前漏洞库中\n- [ ] 信息准确，POC 经过验证或注明来源\n- [ ] 已去除敏感信息（如内部 IP、密码等）';
var url='https://github.com/adysec/hwpoc/issues/new?labels=漏洞提交&template=submit-vulnerability.md&title='+encodeURIComponent('['+(year||'')+'] '+n)+'&body='+encodeURIComponent(b);
window.open(url,'_blank');closeModal()}
</script>
</body>
</html>
